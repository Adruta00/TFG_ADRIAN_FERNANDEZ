# =============================================================================
# config.yaml  —  Configuración central del sistema de trading
# =============================================================================
# INSTRUCCIONES:
#   - Modifica únicamente este archivo para cambiar pares, timeframes, etc.
#   - Nunca hardcodees valores en el código Python: importa siempre desde aquí.
# =============================================================================

exchange:
  id: "binance"              # Exchange a usar (soportado por CCXT)
  symbol: "BTC/USDT"         # Par de trading
  timeframe: "1h"            # Vela: 1m, 5m, 15m, 1h, 4h, 1d
  fees: 0.001                # Comisión por operación (0.1% = Binance spot maker/taker)

data:
  start_date: "2024-01-01"   # Inicio del período histórico (YYYY-MM-DD)
  end_date:   "2025-12-01"   # Fin del período histórico   (YYYY-MM-DD)
  raw_path:      "data/raw"
  processed_path: "data/processed"

backtesting:
  initial_capital: 2000.0   # Capital inicial en USDT
  position_size:   0.15      # Fracción del capital disponible usada por operación

indicators:
  sma_fast: 20               # Período de la media rápida (señal de cruce)
  sma_slow: 50               # Período de la media lenta
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bollinger_period: 20
  bollinger_std: 2.0
  ema_period: 21
  atr_period: 14

results:
  output_path: "results"
  log_level: "INFO"          # DEBUG | INFO | WARNING | ERROR

# =============================================================================
# Sección ML — usada a partir del Hito 2
# =============================================================================
ml:
  window_size:      60        # Número de velas pasadas que forman cada muestra
  target_horizon:   24         # Velas hacia el futuro para calcular el retorno objetivo
  threshold_pct:    0.003     # Umbral mínimo de retorno para etiquetar BUY/SELL (0.1%)
                              # NOTA: 0.3% era demasiado estricto para 5h → muy pocos BUY en train.
                              # 0.1% genera una distribución BUY/SELL/HOLD más equilibrada.
  test_size:        0.20      # Fracción del dataset reservada para test (20%)
  n_splits:         8         # Pliegues de TimeSeriesSplit para validación cruzada

  # Parámetros del Random Forest
  rf_n_estimators:    500     # Más árboles = predicciones más estables
  rf_max_depth:       12       # Menos profundidad = menos sobreajuste
  rf_min_samples_leaf: 5     # Más muestras por hoja = más regularización
  rf_random_state:    42

  # Ruta donde guardar los modelos entrenados
  models_path: "results/models"
