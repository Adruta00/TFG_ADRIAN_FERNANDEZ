# =============================================================================
# config.yaml  —  Configuración central del sistema de trading
# =============================================================================
# INSTRUCCIONES:
#   - Modifica únicamente este archivo para cambiar pares, timeframes, etc.
#   - Nunca hardcodees valores en el código Python: importa siempre desde aquí.
# =============================================================================

exchange:
  id: "binance"              # Exchange a usar (soportado por CCXT)
  symbol: "BTC/USDT"         # Par de trading
  timeframe: "1h"            # Vela: 1m, 5m, 15m, 1h, 4h, 1d
  fees: 0.001                # Comisión por operación (0.1% = Binance spot maker/taker)

data:
  start_date: "2023-01-01"   # Inicio del período histórico (YYYY-MM-DD)
  end_date:   "2024-01-01"   # Fin del período histórico   (YYYY-MM-DD)
  raw_path:      "data/raw"
  processed_path: "data/processed"

backtesting:
  initial_capital: 10000.0   # Capital inicial en USDT
  position_size:   0.95      # Fracción del capital disponible usada por operación

indicators:
  sma_fast: 20               # Período de la media rápida (señal de cruce)
  sma_slow: 50               # Período de la media lenta
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bollinger_period: 20
  bollinger_std: 2.0
  ema_period: 21
  atr_period: 14

results:
  output_path: "results"
  log_level: "INFO"          # DEBUG | INFO | WARNING | ERROR
